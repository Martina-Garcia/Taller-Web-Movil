<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PickMart — Sistema de Picking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">P</div>
    <div>
      <div class="logo-text">PickMart</div>
      <div class="logo-sub">Sistema de Picking</div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">General</div>
    <div class="nav-item active" onclick="navigate('dashboard')"><i class="fa-solid fa-chart-line"></i> Dashboard</div>
    <div class="nav-section-label">Maestros</div>
    <div class="nav-item" onclick="navigate('productos')"><i class="fa-solid fa-box"></i> Productos</div>
    <div class="nav-item" onclick="navigate('pasillos')"><i class="fa-solid fa-map"></i> Pasillos</div>
    <div class="nav-item" onclick="navigate('trabajadores')"><i class="fa-solid fa-user-hard-hat"></i> Trabajadores</div>
    <div class="nav-section-label">Operaciones</div>
    <div class="nav-item" onclick="navigate('pedidos')">
      <i class="fa-solid fa-clipboard-list"></i> Pedidos
      <span class="nav-badge" id="pendientes-badge">3</span>
    </div>
    <div class="nav-item" onclick="navigate('picking')"><i class="fa-solid fa-cart-flatbed"></i> Lista de Picking</div>
  </nav>
  <div class="sidebar-footer">
    <div class="user-chip">
      <div class="user-avatar">CM</div>
      <div>
        <div class="user-name">Carlos M.</div>
        <div class="user-role">Picker · Turno A</div>
      </div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <header class="topbar">
    <div class="topbar-title" id="topbar-title">Dashboard</div>
    <div class="topbar-search">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" placeholder="Buscar…" id="global-search">
    </div>
    <button class="btn-icon" title="Notificaciones"><i class="fa-regular fa-bell"></i></button>
    <button class="btn-icon" title="Ajustes"><i class="fa-solid fa-gear"></i></button>
  </header>

  <!-- ui.js inyecta las vistas aquí -->
  <div class="content" id="app-content"></div>
</main>

<!-- ui.js inyecta los modales aquí -->
<div id="app-modals"></div>

<div class="toast-container" id="toast-container"></div>

<!-- Orden importante: datos → plantillas → lógica -->
<script src="js/data.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
