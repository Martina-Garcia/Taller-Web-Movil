<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PickingApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body class="bg-light">

    <header class="bg-primary bg-gradient text-white p-3 mb-4">
        <div class="container">
            <h1>Ruta de Picking</h1>
        </div>
    </header>

    <main class="container">
        
        <section class="mb-5 bg-white p-4 rounded shadow-sm">
            <h2>Agregar Sustituto</h2>
            <form id="formularioSustituto" class="row g-2 mt-2">
                <div class="col-md-5">
                    <input type="text" id="inputNombre" class="form-control" placeholder="Nombre del producto" required>
                </div>
                <div class="col-md-5">
                    <input type="text" id="inputPasillo" class="form-control" placeholder="Ubicación (Ej: Pasillo 3)" required>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">Guardar</button>
                </div>
            </form>
        </section>

        <section>
            <h2>Artículos del Pedido</h2>
            <div id="listaProductos" class="row mt-3">
                </div>
        </section>

    </main>

    <script src="js/app.js"></script>
</body>
</html>
